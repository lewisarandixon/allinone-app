name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile=false
        working-directory: app
      - name: Typecheck
        run: pnpm tsc -noEmit
        working-directory: app
      - name: Unit tests
        run: pnpm test
        working-directory: app
      - name: Build
        run: pnpm build
        working-directory: app